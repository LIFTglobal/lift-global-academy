<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIFT Global Academy — Admin</title>
<link rel="stylesheet" href="lift-style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="page">

<div class="wrap" id="gate-wrap">
  <div class="card gate" id="gate">
    <div class="spinner"></div>
    Checking your session...
  </div>
</div>

<div id="app-wrap" style="display:none;">

  <div class="navbar">
    <div class="navbar-inner">
      <a class="navbar-brand" href="lift_home_evaluator.html">
        <img class="navbar-logo" src="lift-logo.png" alt="LIFT Global Academy logo">
        <div>
          <div class="navbar-title">School administrator dashboard</div>
          <div class="navbar-subtitle">Signed in as <span id="who-am-i"></span></div>
        </div>
      </a>
      <div class="navbar-actions">
        <a class="navbar-back" href="lift_home_evaluator.html">&larr; Back to home</a>
      </div>
    </div>
  </div>

  <div class="wrap">

    <div class="card">
      <h2>Add a partner school</h2>
      <form id="school-form">
        <label for="school-name">School name</label>
        <input type="text" id="school-name" placeholder="e.g. Cedar Hill Learning Center" required>
        <label for="school-type">Partner type</label>
        <select id="school-type">
          <option value="learning_center_microschool">Learning center / microschool</option>
          <option value="international_school">Unaccredited international school</option>
        </select>
        <button type="submit">Add school</button>
      </form>
      <div class="msg" id="school-msg"></div>
      <div id="school-list" style="margin-top:18px;"></div>
    </div>

    <div class="card">
      <h2>Add a teacher</h2>
      <form id="teacher-form">
        <label for="teacher-school">Partner school</label>
        <select id="teacher-school" required></select>
        <label for="teacher-name">Teacher name</label>
        <input type="text" id="teacher-name" placeholder="e.g. J. Alavi" required>
        <label for="teacher-email">Teacher email</label>
        <input type="email" id="teacher-email" placeholder="teacher@example.com" required>
        <label for="teacher-password">Temporary password</label>
        <input type="text" id="teacher-password" placeholder="Give them something to start with" required>
        <button type="submit">Add teacher</button>
      </form>
      <div class="msg" id="teacher-msg"></div>
      <div id="teacher-list" style="margin-top:18px;"></div>
    </div>

    <div class="card">
      <h2>Add a student</h2>
      <form id="student-form">
        <label for="student-school">Partner school</label>
        <select id="student-school" required></select>
        <label for="student-first">First name</label>
        <input type="text" id="student-first" required>
        <label for="student-last">Last name</label>
        <input type="text" id="student-last" required>
        <label for="student-grade">Grade level</label>
        <select id="student-grade" required>
          <option value="-1">Pre-K</option>
          <option value="0">Kindergarten</option>
          <option value="1">Grade 1</option>
          <option value="2">Grade 2</option>
          <option value="3">Grade 3</option>
          <option value="4">Grade 4</option>
          <option value="5">Grade 5</option>
          <option value="6">Grade 6</option>
          <option value="7">Grade 7</option>
          <option value="8">Grade 8</option>
          <option value="9">Grade 9</option>
          <option value="10">Grade 10</option>
          <option value="11">Grade 11</option>
          <option value="12">Grade 12</option>
        </select>

        <label for="student-dob">Date of birth</label>
        <input type="date" id="student-dob">

        <label for="student-gender">Gender</label>
        <select id="student-gender">
          <option value="">Prefer not to say</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>

        <label for="student-parent">Parent/guardian name</label>
        <input type="text" id="student-parent" placeholder="e.g. John &amp; Jane Smith">

        <label for="student-address">Street address</label>
        <input type="text" id="student-address" placeholder="e.g. 160 Central Park South">

        <div style="display:grid; grid-template-columns: 2fr 1fr 1fr; gap:10px;">
          <div>
            <label for="student-city">City</label>
            <input type="text" id="student-city">
          </div>
          <div>
            <label for="student-state">State</label>
            <input type="text" id="student-state">
          </div>
          <div>
            <label for="student-zip">ZIP</label>
            <input type="text" id="student-zip">
          </div>
        </div>

        <button type="submit">Add student</button>
      </form>
      <div class="msg" id="student-msg"></div>
      <div id="student-list" style="margin-top:18px;"></div>
    </div>

    <div class="card">
      <h2>Student school history</h2>
      <div class="hint" style="margin-top:0; margin-bottom:14px;">Used on transcripts to list every school a student has attended — add one row per school year.</div>

      <label for="history-student-select">Student</label>
      <select id="history-student-select"></select>
      <div id="history-list" style="margin:16px 0;"></div>

      <h3>Add a school history entry</h3>
      <form id="history-form">
        <label for="hist-school-name">School name</label>
        <input type="text" id="hist-school-name" required placeholder="e.g. ABC School">

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
          <div>
            <label for="hist-teacher">Teacher name</label>
            <input type="text" id="hist-teacher">
          </div>
          <div>
            <label for="hist-grade-label">Grade level</label>
            <input type="text" id="hist-grade-label" placeholder="e.g. 1st, 10th">
          </div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
          <div>
            <label for="hist-days-present">Days present</label>
            <input type="number" id="hist-days-present" min="0">
          </div>
          <div>
            <label for="hist-days-absent">Days absent</label>
            <input type="number" id="hist-days-absent" min="0">
          </div>
          <div>
            <label for="hist-promotion">Promotion status</label>
            <input type="text" id="hist-promotion" placeholder="e.g. Promoted">
          </div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
          <div>
            <label for="hist-entered">Entered</label>
            <input type="date" id="hist-entered">
          </div>
          <div>
            <label for="hist-exited">Exited</label>
            <input type="date" id="hist-exited">
          </div>
        </div>

        <label for="hist-address">School address</label>
        <input type="text" id="hist-address">

        <div style="display:grid; grid-template-columns: 2fr 1fr 1fr; gap:10px;">
          <div>
            <label for="hist-city">City</label>
            <input type="text" id="hist-city">
          </div>
          <div>
            <label for="hist-state">State</label>
            <input type="text" id="hist-state">
          </div>
          <div>
            <label for="hist-zip">ZIP</label>
            <input type="text" id="hist-zip">
          </div>
        </div>

        <button type="submit">Add entry</button>
      </form>
      <div class="msg" id="history-msg"></div>
    </div>

  </div>
</div>

<script>
  const SUPABASE_URL = "https://ojmqlvtyygvethwrdqon.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qbXFsdnR5eWd2ZXRod3JkcW9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MzEyMTQsImV4cCI6MjA5ODAwNzIxNH0.IWLrhtb4w_dq-_pjW1wzRAX6-0qI4Hmwtp5p_cSSVWM";
  const CREATE_TEACHER_FUNCTION_URL = "https://ojmqlvtyygvethwrdqon.supabase.co/functions/v1/create_teacher";

  const { createClient } = supabase;
  const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function showMsg(el, text, type) {
    el.textContent = text;
    el.className = "msg " + type;
    el.style.display = "block";
  }

  function clearMsg(el) {
    el.style.display = "none";
  }

  let cachedSchools = [];
  let cachedStudents = [];

  // ---------- Gate: only allow school_admin accounts in ----------
  async function checkAccess() {
    const { data: sessionData } = await client.auth.getSession();
    if (!sessionData.session) {
      document.getElementById("gate").innerHTML =
        "You're not signed in. Sign in through the LIFT login page first, then come back to this page.";
      return;
    }

    const userId = sessionData.session.user.id;
    const { data: account, error } = await client
      .from("accounts")
      .select("name, role")
      .eq("id", userId)
      .single();

    if (error || !account) {
      document.getElementById("gate").innerHTML =
        "Signed in, but no matching accounts row was found for this user.";
      return;
    }

    if (account.role !== "school_admin" && account.role !== "lift_evaluator") {
      document.getElementById("gate").innerHTML =
        "Signed in as " + account.name + ", but this account's role (" + account.role +
        ") doesn't have access to the admin dashboard.";
      return;
    }

    document.getElementById("who-am-i").textContent = account.name + " (" + account.role + ")";
    document.getElementById("gate-wrap").style.display = "none";
    document.getElementById("app-wrap").style.display = "block";

    await loadSchools();
    await loadTeachers();
    await loadStudents();
  }

  // ---------- Schools ----------
  async function loadSchools() {
    const { data, error } = await client
      .from("partner_schools")
      .select("id, name, partner_type, logo_url")
      .order("created_at", { ascending: false });

    if (error) {
      document.getElementById("school-list").innerHTML =
        '<div class="empty-note">Could not load schools: ' + error.message + "</div>";
      return;
    }

    cachedSchools = data || [];

    const listEl = document.getElementById("school-list");
    listEl.innerHTML = cachedSchools.length
      ? cachedSchools.map(s => {
          const logoImg = s.logo_url
            ? '<img src="' + s.logo_url + '" alt="" style="width:26px;height:26px;border-radius:50%;object-fit:cover;margin-right:8px;vertical-align:middle;">'
            : "";
          return '<div class="list-item" style="align-items:center;">' +
            '<span style="display:flex;align-items:center;">' + logoImg + s.name + "</span>" +
            '<span class="meta">' + s.partner_type + "</span></div>" +
            '<div style="display:flex; gap:8px; align-items:center; padding:0 0 12px;">' +
              '<input type="file" accept="image/*" class="logo-file-input" data-school-id="' + s.id + '" style="max-width:220px; font-size:12px;">' +
              '<button type="button" class="secondary logo-upload-btn" data-school-id="' + s.id + '">Upload logo</button>' +
            "</div>";
        }).join("")
      : '<div class="empty-note">No schools added yet.</div>';

    document.querySelectorAll(".logo-upload-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        const schoolId = btn.dataset.schoolId;
        const fileInput = document.querySelector('.logo-file-input[data-school-id="' + schoolId + '"]');
        const file = fileInput.files[0];
        if (!file) {
          alert("Choose an image file first.");
          return;
        }
        btn.disabled = true;
        btn.textContent = "Uploading...";
        try {
          const path = schoolId + "/logo_" + Date.now() + "_" + file.name;
          const { error: uploadError } = await client.storage
            .from("school-logos")
            .upload(path, file);

          if (uploadError) {
            alert("Upload failed: " + uploadError.message);
            return;
          }

          const { data: publicUrlData } = client.storage.from("school-logos").getPublicUrl(path);

          const { error: updateError } = await client
            .from("partner_schools")
            .update({ logo_url: publicUrlData.publicUrl })
            .eq("id", schoolId);

          if (updateError) {
            alert("Saved the file, but could not link it to the school: " + updateError.message);
            return;
          }

          await loadSchools();
        } finally {
          btn.disabled = false;
          btn.textContent = "Upload logo";
        }
      });
    });

    const schoolOptions = cachedSchools.map(s =>
      '<option value="' + s.id + '">' + s.name + "</option>"
    ).join("");

    const teacherSelect = document.getElementById("teacher-school");
    const studentSelect = document.getElementById("student-school");
    teacherSelect.innerHTML = schoolOptions || '<option value="">Add a school first</option>';
    studentSelect.innerHTML = schoolOptions || '<option value="">Add a school first</option>';
  }

  document.getElementById("school-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const msgEl = document.getElementById("school-msg");
    clearMsg(msgEl);

    const name = document.getElementById("school-name").value.trim();
    const partner_type = document.getElementById("school-type").value;

    const { error } = await client.from("partner_schools").insert({ name, partner_type });

    if (error) {
      showMsg(msgEl, error.message, "error");
      return;
    }

    showMsg(msgEl, "School added.", "success");
    document.getElementById("school-form").reset();
    await loadSchools();
  });

  // ---------- Teachers ----------
  async function loadTeachers() {
    const { data, error } = await client
      .from("accounts")
      .select("name, email, partner_school_id")
      .eq("role", "teacher")
      .order("created_at", { ascending: false });

    const listEl = document.getElementById("teacher-list");
    if (error) {
      listEl.innerHTML = '<div class="empty-note">Could not load teachers: ' + error.message + "</div>";
      return;
    }

    listEl.innerHTML = data.length
      ? data.map(t => {
          const school = cachedSchools.find(s => s.id === t.partner_school_id);
          return '<div class="list-item"><span>' + t.name + '</span><span class="meta">' +
                 (school ? school.name : "") + "</span></div>";
        }).join("")
      : '<div class="empty-note">No teachers added yet.</div>';
  }

  document.getElementById("teacher-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const msgEl = document.getElementById("teacher-msg");
    clearMsg(msgEl);
    const submitBtn = e.target.querySelector("button");
    submitBtn.disabled = true;
    submitBtn.textContent = "Adding...";

    const partner_school_id = document.getElementById("teacher-school").value;
    const name = document.getElementById("teacher-name").value.trim();
    const email = document.getElementById("teacher-email").value.trim();
    const password = document.getElementById("teacher-password").value;

    try {
      const { data: sessionData } = await client.auth.getSession();
      const accessToken = sessionData.session.access_token;

      const resp = await fetch(CREATE_TEACHER_FUNCTION_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + accessToken,
        },
        body: JSON.stringify({ name, email, password, partner_school_id }),
      });

      const result = await resp.json();

      if (!resp.ok) {
        showMsg(msgEl, result.error || "Something went wrong creating this teacher.", "error");
        return;
      }

      showMsg(msgEl, "Teacher account created. They can log in with the email and password you set.", "success");
      document.getElementById("teacher-form").reset();
      await loadTeachers();
    } catch (err) {
      showMsg(msgEl, "Network error: " + err.message, "error");
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Add teacher";
    }
  });

  // ---------- Students ----------
  async function loadStudents() {
    const { data, error } = await client
      .from("students")
      .select("id, first_name, last_name, grade_level, partner_school_id")
      .order("created_at", { ascending: false });

    const listEl = document.getElementById("student-list");
    if (error) {
      listEl.innerHTML = '<div class="empty-note">Could not load students: ' + error.message + "</div>";
      return;
    }

    cachedStudents = data || [];

    listEl.innerHTML = cachedStudents.length
      ? cachedStudents.map(s => {
          const school = cachedSchools.find(sc => sc.id === s.partner_school_id);
          return '<div class="list-item"><span>' + s.first_name + " " + s.last_name +
                 " (Grade " + s.grade_level + ')</span><span class="meta">' +
                 (school ? school.name : "") + "</span></div>";
        }).join("")
      : '<div class="empty-note">No students added yet.</div>';

    const historySelect = document.getElementById("history-student-select");
    const studentOptions = cachedStudents.map(s =>
      '<option value="' + s.id + '">' + s.first_name + " " + s.last_name + "</option>"
    ).join("");
    historySelect.innerHTML = '<option value="">Choose a student...</option>' + studentOptions;
  }

  document.getElementById("student-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const msgEl = document.getElementById("student-msg");
    clearMsg(msgEl);

    const partner_school_id = document.getElementById("student-school").value;
    const first_name = document.getElementById("student-first").value.trim();
    const last_name = document.getElementById("student-last").value.trim();
    const grade_level = parseInt(document.getElementById("student-grade").value, 10);
    const date_of_birth = document.getElementById("student-dob").value || null;
    const gender = document.getElementById("student-gender").value || null;
    const parent_guardian_name = document.getElementById("student-parent").value.trim() || null;
    const address_line = document.getElementById("student-address").value.trim() || null;
    const city = document.getElementById("student-city").value.trim() || null;
    const state = document.getElementById("student-state").value.trim() || null;
    const zip = document.getElementById("student-zip").value.trim() || null;

    const { error } = await client.from("students").insert({
      partner_school_id, first_name, last_name, grade_level,
      date_of_birth, gender, parent_guardian_name, address_line, city, state, zip,
    });

    if (error) {
      showMsg(msgEl, error.message, "error");
      return;
    }

    showMsg(msgEl, "Student added.", "success");
    document.getElementById("student-form").reset();
    await loadStudents();
  });

  // ---------- Student school history ----------
  document.getElementById("history-student-select").addEventListener("change", async (e) => {
    const studentId = e.target.value;
    if (!studentId) {
      document.getElementById("history-list").innerHTML = "";
      return;
    }
    await loadHistoryForStudent(studentId);
  });

  async function loadHistoryForStudent(studentId) {
    const listEl = document.getElementById("history-list");
    listEl.innerHTML = "Loading...";

    const { data, error } = await client
      .from("student_school_history")
      .select("id, school_name, teacher_name, grade_level_label, days_present, days_absent, promotion_status, entered_date, exited_date, address_line, city, state, zip, sort_order")
      .eq("student_id", studentId)
      .order("sort_order");

    if (error) {
      listEl.innerHTML = '<div class="empty-note">Could not load school history: ' + error.message + "</div>";
      return;
    }

    if (!data || data.length === 0) {
      listEl.innerHTML = '<div class="empty-note">No school history entries yet.</div>';
      return;
    }

    listEl.innerHTML = data.map(h => {
      const parts = [];
      if (h.grade_level_label) parts.push("Grade " + h.grade_level_label);
      if (h.teacher_name) parts.push("Teacher: " + h.teacher_name);
      if (h.days_present != null || h.days_absent != null) {
        parts.push("Days " + (h.days_present != null ? h.days_present : "—") + "/" + (h.days_absent != null ? h.days_absent : "—"));
      }
      if (h.promotion_status) parts.push(h.promotion_status);
      if (h.entered_date) parts.push("Entered " + h.entered_date);
      if (h.exited_date) parts.push("Exited " + h.exited_date);
      return '<div class="list-item">' +
        "<div><div style=\"font-weight:600;\">" + h.school_name + "</div>" +
        '<div class="meta">' + parts.join(" &middot; ") + "</div></div>" +
        '<button type="button" class="back history-delete-btn" data-id="' + h.id + '" style="padding:6px 10px; font-size:12px;">Remove</button>' +
        "</div>";
    }).join("");

    document.querySelectorAll(".history-delete-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        if (!confirm("Remove this school history entry?")) return;
        const { error: deleteError } = await client.from("student_school_history").delete().eq("id", btn.dataset.id);
        if (deleteError) {
          alert("Could not remove: " + deleteError.message);
          return;
        }
        await loadHistoryForStudent(studentId);
      });
    });
  }

  document.getElementById("history-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const msgEl = document.getElementById("history-msg");
    clearMsg(msgEl);

    const studentId = document.getElementById("history-student-select").value;
    if (!studentId) {
      showMsg(msgEl, "Choose a student first.", "error");
      return;
    }

    const { count } = await client
      .from("student_school_history")
      .select("id", { count: "exact", head: true })
      .eq("student_id", studentId);

    const payload = {
      student_id: studentId,
      school_name: document.getElementById("hist-school-name").value.trim(),
      teacher_name: document.getElementById("hist-teacher").value.trim() || null,
      grade_level_label: document.getElementById("hist-grade-label").value.trim() || null,
      days_present: document.getElementById("hist-days-present").value ? parseInt(document.getElementById("hist-days-present").value, 10) : null,
      days_absent: document.getElementById("hist-days-absent").value ? parseInt(document.getElementById("hist-days-absent").value, 10) : null,
      promotion_status: document.getElementById("hist-promotion").value.trim() || null,
      entered_date: document.getElementById("hist-entered").value || null,
      exited_date: document.getElementById("hist-exited").value || null,
      address_line: document.getElementById("hist-address").value.trim() || null,
      city: document.getElementById("hist-city").value.trim() || null,
      state: document.getElementById("hist-state").value.trim() || null,
      zip: document.getElementById("hist-zip").value.trim() || null,
      sort_order: count || 0,
    };

    const { error } = await client.from("student_school_history").insert(payload);

    if (error) {
      showMsg(msgEl, error.message, "error");
      return;
    }

    showMsg(msgEl, "School history entry added.", "success");
    document.getElementById("history-form").reset();
    await loadHistoryForStudent(studentId);
  });

  checkAccess();
</script>

</body>
</html>
