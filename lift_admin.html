<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIFT Global Academy — Admin</title>
<link rel="stylesheet" href="lift-style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="page">

<div class="wrap" id="gate-wrap">
  <div class="card gate" id="gate">
    <div class="spinner"></div>
    Checking your session...
  </div>
</div>

<div id="app-wrap" style="display:none;">

  <div class="navbar">
    <div class="navbar-inner">
      <a class="navbar-brand" href="lift_home_evaluator.html">
        <img class="navbar-logo" src="lift-logo.png" alt="LIFT Global Academy logo">
        <div>
          <div class="navbar-title">School administrator dashboard</div>
          <div class="navbar-subtitle">Signed in as <span id="who-am-i"></span></div>
        </div>
      </a>
      <div class="navbar-actions">
        <a class="navbar-back" href="lift_home_evaluator.html">&larr; Back to home</a>
      </div>
    </div>
  </div>

  <div class="wrap">

    <div class="card">
      <h2>Add a partner school</h2>
      <form id="school-form">
        <label for="school-name">School name</label>
        <input type="text" id="school-name" placeholder="e.g. Cedar Hill Learning Center" required>
        <label for="school-type">Partner type</label>
        <select id="school-type">
          <option value="learning_center_microschool">Learning center / microschool</option>
          <option value="international_school">Unaccredited international school</option>
        </select>
        <button type="submit">Add school</button>
      </form>
      <div class="msg" id="school-msg"></div>
      <div id="school-list" style="margin-top:18px;"></div>
    </div>

    <div class="card">
      <h2>Add a teacher</h2>
      <form id="teacher-form">
        <label for="teacher-school">Partner school</label>
        <select id="teacher-school" required></select>
        <label for="teacher-name">Teacher name</label>
        <input type="text" id="teacher-name" placeholder="e.g. J. Alavi" required>
        <label for="teacher-email">Teacher email</label>
        <input type="email" id="teacher-email" placeholder="teacher@example.com" required>
        <label for="teacher-password">Temporary password</label>
        <input type="text" id="teacher-password" placeholder="Give them something to start with" required>
        <button type="submit">Add teacher</button>
      </form>
      <div class="msg" id="teacher-msg"></div>
      <div id="teacher-list" style="margin-top:18px;"></div>
    </div>

    <div class="card">
      <h2>Add a student</h2>
      <form id="student-form">
        <label for="student-school">Partner school</label>
        <select id="student-school" required></select>
        <label for="student-first">First name</label>
        <input type="text" id="student-first" required>
        <label for="student-last">Last name</label>
        <input type="text" id="student-last" required>
        <label for="student-grade">Grade level</label>
        <select id="student-grade" required>
          <option value="-1">Pre-K</option>
          <option value="0">Kindergarten</option>
          <option value="1">Grade 1</option>
          <option value="2">Grade 2</option>
          <option value="3">Grade 3</option>
          <option value="4">Grade 4</option>
          <option value="5">Grade 5</option>
          <option value="6">Grade 6</option>
          <option value="7">Grade 7</option>
          <option value="8">Grade 8</option>
          <option value="9">Grade 9</option>
          <option value="10">Grade 10</option>
          <option value="11">Grade 11</option>
          <option value="12">Grade 12</option>
        </select>
        <button type="submit">Add student</button>
      </form>
      <div class="msg" id="student-msg"></div>
      <div id="student-list" style="margin-top:18px;"></div>
    </div>

  </div>
</div>

<script>
  const SUPABASE_URL = "https://ojmqlvtyygvethwrdqon.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qbXFsdnR5eWd2ZXRod3JkcW9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MzEyMTQsImV4cCI6MjA5ODAwNzIxNH0.IWLrhtb4w_dq-_pjW1wzRAX6-0qI4Hmwtp5p_cSSVWM";
  const CREATE_TEACHER_FUNCTION_URL = "https://ojmqlvtyygvethwrdqon.supabase.co/functions/v1/create_teacher";

  const { createClient } = supabase;
  const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function showMsg(el, text, type) {
    el.textContent = text;
    el.className = "msg " + type;
    el.style.display = "block";
  }

  function clearMsg(el) {
    el.style.display = "none";
  }

  let cachedSchools = [];

  // ---------- Gate: only allow school_admin accounts in ----------
  async function checkAccess() {
    const { data: sessionData } = await client.auth.getSession();
    if (!sessionData.session) {
      document.getElementById("gate").innerHTML =
        "You're not signed in. Sign in through the LIFT login page first, then come back to this page.";
      return;
    }

    const userId = sessionData.session.user.id;
    const { data: account, error } = await client
      .from("accounts")
      .select("name, role")
      .eq("id", userId)
      .single();

    if (error || !account) {
      document.getElementById("gate").innerHTML =
        "Signed in, but no matching accounts row was found for this user.";
      return;
    }

    if (account.role !== "school_admin" && account.role !== "lift_evaluator") {
      document.getElementById("gate").innerHTML =
        "Signed in as " + account.name + ", but this account's role (" + account.role +
        ") doesn't have access to the admin dashboard.";
      return;
    }

    document.getElementById("who-am-i").textContent = account.name + " (" + account.role + ")";
    document.getElementById("gate-wrap").style.display = "none";
    document.getElementById("app-wrap").style.display = "block";

    await loadSchools();
    await loadTeachers();
    await loadStudents();
  }

  // ---------- Schools ----------
  async function loadSchools() {
    const { data, error } = await client
      .from("partner_schools")
      .select("id, name, partner_type")
      .order("created_at", { ascending: false });

    if (error) {
      document.getElementById("school-list").innerHTML =
        '<div class="empty-note">Could not load schools: ' + error.message + "</div>";
      return;
    }

    cachedSchools = data || [];

    const listEl = document.getElementById("school-list");
    listEl.innerHTML = cachedSchools.length
      ? cachedSchools.map(s =>
          '<div class="list-item"><span>' + s.name + '</span><span class="meta">' + s.partner_type + "</span></div>"
        ).join("")
      : '<div class="empty-note">No schools added yet.</div>';

    const schoolOptions = cachedSchools.map(s =>
      '<option value="' + s.id + '">' + s.name + "</option>"
    ).join("");

    const teacherSelect = document.getElementById("teacher-school");
    const studentSelect = document.getElementById("student-school");
    teacherSelect.innerHTML = schoolOptions || '<option value="">Add a school first</option>';
    studentSelect.innerHTML = schoolOptions || '<option value="">Add a school first</option>';
  }

  document.getElementById("school-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const msgEl = document.getElementById("school-msg");
    clearMsg(msgEl);

    const name = document.getElementById("school-name").value.trim();
    const partner_type = document.getElementById("school-type").value;

    const { error } = await client.from("partner_schools").insert({ name, partner_type });

    if (error) {
      showMsg(msgEl, error.message, "error");
      return;
    }

    showMsg(msgEl, "School added.", "success");
    document.getElementById("school-form").reset();
    await loadSchools();
  });

  // ---------- Teachers ----------
  async function loadTeachers() {
    const { data, error } = await client
      .from("accounts")
      .select("name, email, partner_school_id")
      .eq("role", "teacher")
      .order("created_at", { ascending: false });

    const listEl = document.getElementById("teacher-list");
    if (error) {
      listEl.innerHTML = '<div class="empty-note">Could not load teachers: ' + error.message + "</div>";
      return;
    }

    listEl.innerHTML = data.length
      ? data.map(t => {
          const school = cachedSchools.find(s => s.id === t.partner_school_id);
          return '<div class="list-item"><span>' + t.name + '</span><span class="meta">' +
                 (school ? school.name : "") + "</span></div>";
        }).join("")
      : '<div class="empty-note">No teachers added yet.</div>';
  }

  document.getElementById("teacher-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const msgEl = document.getElementById("teacher-msg");
    clearMsg(msgEl);
    const submitBtn = e.target.querySelector("button");
    submitBtn.disabled = true;
    submitBtn.textContent = "Adding...";

    const partner_school_id = document.getElementById("teacher-school").value;
    const name = document.getElementById("teacher-name").value.trim();
    const email = document.getElementById("teacher-email").value.trim();
    const password = document.getElementById("teacher-password").value;

    try {
      const { data: sessionData } = await client.auth.getSession();
      const accessToken = sessionData.session.access_token;

      const resp = await fetch(CREATE_TEACHER_FUNCTION_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + accessToken,
        },
        body: JSON.stringify({ name, email, password, partner_school_id }),
      });

      const result = await resp.json();

      if (!resp.ok) {
        showMsg(msgEl, result.error || "Something went wrong creating this teacher.", "error");
        return;
      }

      showMsg(msgEl, "Teacher account created. They can log in with the email and password you set.", "success");
      document.getElementById("teacher-form").reset();
      await loadTeachers();
    } catch (err) {
      showMsg(msgEl, "Network error: " + err.message, "error");
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Add teacher";
    }
  });

  // ---------- Students ----------
  async function loadStudents() {
    const { data, error } = await client
      .from("students")
      .select("first_name, last_name, grade_level, partner_school_id")
      .order("created_at", { ascending: false });

    const listEl = document.getElementById("student-list");
    if (error) {
      listEl.innerHTML = '<div class="empty-note">Could not load students: ' + error.message + "</div>";
      return;
    }

    listEl.innerHTML = data.length
      ? data.map(s => {
          const school = cachedSchools.find(sc => sc.id === s.partner_school_id);
          return '<div class="list-item"><span>' + s.first_name + " " + s.last_name +
                 " (Grade " + s.grade_level + ')</span><span class="meta">' +
                 (school ? school.name : "") + "</span></div>";
        }).join("")
      : '<div class="empty-note">No students added yet.</div>';
  }

  document.getElementById("student-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const msgEl = document.getElementById("student-msg");
    clearMsg(msgEl);

    const partner_school_id = document.getElementById("student-school").value;
    const first_name = document.getElementById("student-first").value.trim();
    const last_name = document.getElementById("student-last").value.trim();
    const grade_level = parseInt(document.getElementById("student-grade").value, 10);

    const { error } = await client.from("students").insert({
      partner_school_id, first_name, last_name, grade_level,
    });

    if (error) {
      showMsg(msgEl, error.message, "error");
      return;
    }

    showMsg(msgEl, "Student added.", "success");
    document.getElementById("student-form").reset();
    await loadStudents();
  });

  checkAccess();
</script>

</body>
</html>
