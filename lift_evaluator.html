<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIFT Global Academy — Evaluator</title>
<link rel="stylesheet" href="lift-style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="page">

<div class="wrap" id="gate-wrap">
  <div class="card gate" id="gate">
    <div class="spinner"></div>
    Checking your session...
  </div>
</div>

<div id="app-wrap" style="display:none;">

  <div class="navbar">
    <div class="navbar-inner">
      <a class="navbar-brand" href="lift_home_evaluator.html">
        <img class="navbar-logo" src="lift-logo.png" alt="LIFT Global Academy logo">
        <div>
          <div class="navbar-title">Evaluator review queue</div>
          <div class="navbar-subtitle">Signed in as <span id="who-am-i"></span></div>
        </div>
      </a>
      <div class="navbar-actions">
        <a class="navbar-back" href="lift_home_evaluator.html">&larr; Back to home</a>
      </div>
    </div>
  </div>

  <div class="wrap">

    <div class="card" id="queue-card">
      <h2>Pending review</h2>
      <div id="queue-list"></div>
    </div>

    <div class="card" id="detail-card" style="display:none;">
      <button class="back" id="back-btn">&larr; Back to queue</button>
      <div style="margin-top:20px;">
        <div class="detail-row">
          <div class="detail-label">Student</div>
          <div class="detail-value" id="d-student"></div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Subject</div>
          <div class="detail-value" id="d-subject"></div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Submitted by</div>
          <div class="detail-value" id="d-teacher"></div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Grade submitted</div>
          <div class="grade-display" id="d-grade"></div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Written evaluation</div>
          <div class="detail-value" id="d-evaluation"></div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Teacher comments to LIFT</div>
          <div class="detail-value" id="d-comments"></div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Attached documents</div>
          <div id="d-documents"></div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Award credit (required to approve)</div>
          <select id="award-category" style="margin-bottom:8px;"></select>
          <input type="number" id="award-value" step="0.5" placeholder="Credit value, e.g. 10">
        </div>
        <div class="detail-row">
          <div class="detail-label">Evaluator note (required if requesting revisions)</div>
          <textarea id="evaluator-note" placeholder="Explain what's missing or needs correction..."></textarea>
        </div>
        <div class="actions">
          <button class="approve" id="approve-btn">&#9989; Approve</button>
          <button class="revise" id="revise-btn">&#10060; Request revisions</button>
        </div>
        <div class="msg" id="detail-msg"></div>
      </div>
    </div>

  </div>
</div>

<script>
  const SUPABASE_URL = "https://ojmqlvtyygvethwrdqon.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qbXFsdnR5eWd2ZXRod3JkcW9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MzEyMTQsImV4cCI6MjA5ODAwNzIxNH0.IWLrhtb4w_dq-_pjW1wzRAX6-0qI4Hmwtp5p_cSSVWM";

  const { createClient } = supabase;
  const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let myAccount = null;
  let currentPackage = null;

  function showMsg(el, text, type) {
    el.textContent = text;
    el.className = "msg " + type;
    el.style.display = "block";
  }

  function statusLabel(status) {
    return {
      pending_review: "Pending review",
      approved: "Approved",
      revisions_requested: "Revisions requested",
    }[status] || status;
  }

  let cachedRequirements = [];

  async function loadRequirementCategories() {
    const { data, error } = await client
      .from("graduation_requirements")
      .select("subject_category, credits_required")
      .order("sort_order");

    if (!error && data) {
      cachedRequirements = data;
      const select = document.getElementById("award-category");
      select.innerHTML = '<option value="">Choose a category...</option>' +
        data.map(r => '<option value="' + r.subject_category + '">' + r.subject_category + "</option>").join("");
    }
  }

  async function checkAccess() {
    const { data: sessionData } = await client.auth.getSession();
    if (!sessionData.session) {
      document.getElementById("gate").innerHTML =
        "You're not signed in. Sign in through the LIFT login page first, then come back to this page.";
      return;
    }

    const userId = sessionData.session.user.id;
    const { data: account, error } = await client
      .from("accounts")
      .select("id, name, role")
      .eq("id", userId)
      .single();

    if (error || !account) {
      document.getElementById("gate").innerHTML =
        "Signed in, but no matching accounts row was found for this user.";
      return;
    }

    if (account.role !== "lift_evaluator") {
      document.getElementById("gate").innerHTML =
        "Signed in as " + account.name + ", but this account's role (" + account.role +
        ") doesn't have access to the evaluator queue.";
      return;
    }

    myAccount = account;
    document.getElementById("who-am-i").textContent = account.name;
    document.getElementById("gate-wrap").style.display = "none";
    document.getElementById("app-wrap").style.display = "block";

    await loadRequirementCategories();
    await loadQueue();
  }

  async function loadQueue() {
    const { data, error } = await client
      .from("review_packages")
      .select(`
        id, subject, grade_value, status, created_at, submitted_at,
        student_id, submitted_by_account_id,
        students:student_id ( first_name, last_name, grade_level, partner_school_id ),
        accounts:submitted_by_account_id ( name )
      `)
      .in("status", ["pending_review", "approved", "revisions_requested"])
      .order("submitted_at", { ascending: false });

    const listEl = document.getElementById("queue-list");
    if (error) {
      listEl.innerHTML = '<div class="empty-note">Could not load the queue: ' + error.message + "</div>";
      return;
    }

    if (!data || data.length === 0) {
      listEl.innerHTML = '<div class="empty-note">No submissions yet.</div>';
      return;
    }

    listEl.innerHTML = data.map(p => {
      const studentName = p.students ? p.students.first_name + " " + p.students.last_name : "Unknown student";
      const teacherName = p.accounts ? p.accounts.name : "Unknown teacher";
      return '<div class="queue-item" data-id="' + p.id + '">' +
        '<div class="row1"><span class="student-name">' + studentName + "</span>" +
        '<span class="status-pill status-' + p.status + '">' + statusLabel(p.status) + "</span></div>" +
        '<div class="meta">' + (p.subject || "—") + " &middot; submitted by " + teacherName + "</div>" +
        "</div>";
    }).join("");

    document.querySelectorAll(".queue-item").forEach(el => {
      el.addEventListener("click", () => openPackage(el.dataset.id, data));
    });
  }

  async function openPackage(id, data) {
    const pkg = data.find(p => p.id === id);
    if (!pkg) return;
    currentPackage = pkg;

    const studentName = pkg.students ? pkg.students.first_name + " " + pkg.students.last_name + " (Grade " + pkg.students.grade_level + ")" : "Unknown student";
    const teacherName = pkg.accounts ? pkg.accounts.name : "Unknown teacher";

    document.getElementById("d-student").textContent = studentName;
    document.getElementById("d-subject").textContent = pkg.subject || "—";
    document.getElementById("d-teacher").textContent = teacherName;
    document.getElementById("d-grade").textContent = pkg.grade_value || "—";
    document.getElementById("d-evaluation").textContent = pkg.written_evaluation || "(none provided)";
    document.getElementById("d-comments").textContent = pkg.teacher_comments || "(none)";
    document.getElementById("evaluator-note").value = "";
    document.getElementById("award-category").value = "";
    document.getElementById("award-value").value = pkg.recommended_credit_value || "";
    document.getElementById("detail-msg").style.display = "none";

    const docsEl = document.getElementById("d-documents");
    docsEl.innerHTML = "Loading...";

    const { data: docs, error: docsError } = await client
      .from("documents")
      .select("id, document_type, file_path, file_name")
      .eq("review_package_id", id);

    if (docsError || !docs || docs.length === 0) {
      docsEl.innerHTML = '<div class="detail-value">(no documents attached)</div>';
    } else {
      const links = await Promise.all(docs.map(async (doc) => {
        const { data: signed } = await client.storage
          .from("documents")
          .createSignedUrl(doc.file_path, 3600); // link valid for 1 hour
        const url = signed ? signed.signedUrl : "#";
        return '<div class="detail-value"><a href="' + url + '" target="_blank">' +
               doc.file_name + "</a> (" + doc.document_type.replace(/_/g, " ") + ")</div>";
      }));
      docsEl.innerHTML = links.join("");
    }

    document.getElementById("queue-card").style.display = "none";
    document.getElementById("detail-card").style.display = "block";
  }

  document.getElementById("back-btn").addEventListener("click", () => {
    document.getElementById("detail-card").style.display = "none";
    document.getElementById("queue-card").style.display = "block";
    loadQueue();
  });

  async function decide(decision) {
    const msgEl = document.getElementById("detail-msg");
    const note = document.getElementById("evaluator-note").value.trim();
    const awardCategory = document.getElementById("award-category").value;
    const awardValue = document.getElementById("award-value").value;

    if (decision === "revisions_requested" && !note) {
      showMsg(msgEl, "A note is required when requesting revisions.", "error");
      return;
    }

    if (decision === "approved" && (!awardCategory || !awardValue)) {
      showMsg(msgEl, "Choose a credit category and enter a credit value before approving.", "error");
      return;
    }

    document.getElementById("approve-btn").disabled = true;
    document.getElementById("revise-btn").disabled = true;

    // Record the decision
    const { error: decisionError } = await client.from("evaluation_decisions").insert({
      review_package_id: currentPackage.id,
      evaluator_account_id: myAccount.id,
      decision,
      note: note || null,
    });

    if (decisionError) {
      showMsg(msgEl, decisionError.message, "error");
      document.getElementById("approve-btn").disabled = false;
      document.getElementById("revise-btn").disabled = false;
      return;
    }

    // Update the package's status, and if approved, the awarded credit too
    const updatePayload = { status: decision };
    if (decision === "approved") {
      updatePayload.awarded_credit_category = awardCategory;
      updatePayload.awarded_credit_value = parseFloat(awardValue);
    }

    const { error: updateError } = await client
      .from("review_packages")
      .update(updatePayload)
      .eq("id", currentPackage.id);

    document.getElementById("approve-btn").disabled = false;
    document.getElementById("revise-btn").disabled = false;

    if (updateError) {
      showMsg(msgEl, updateError.message, "error");
      return;
    }

    showMsg(msgEl, decision === "approved" ? "Approved." : "Revisions requested.", "success");

    setTimeout(() => {
      document.getElementById("detail-card").style.display = "none";
      document.getElementById("queue-card").style.display = "block";
      loadQueue();
    }, 900);
  }

  document.getElementById("approve-btn").addEventListener("click", () => decide("approved"));
  document.getElementById("revise-btn").addEventListener("click", () => decide("revisions_requested"));

  checkAccess();
</script>

</body>
</html>
