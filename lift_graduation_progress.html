<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIFT Global Academy — Graduation Progress</title>
<link rel="stylesheet" href="lift-style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="page">

<div class="wrap" id="gate-wrap">
  <div class="card gate" id="gate">
    <div class="spinner"></div>
    Checking your session...
  </div>
</div>

<div id="app-wrap" style="display:none;">

  <div class="navbar">
    <div class="navbar-inner">
      <a class="navbar-brand" href="lift_home_evaluator.html">
        <img class="navbar-logo" src="lift-logo.png" alt="LIFT Global Academy logo">
        <div>
          <div class="navbar-title">Graduation progress</div>
          <div class="navbar-subtitle">Signed in as <span id="who-am-i"></span></div>
        </div>
      </a>
      <div class="navbar-actions">
        <a class="navbar-back" href="lift_home_evaluator.html">&larr; Back to home</a>
      </div>
    </div>
  </div>

  <div class="wrap">

    <div class="card">
      <h2>Select a student</h2>
      <select id="student-select"></select>

      <div class="overall-bar-wrap" id="overall-wrap" style="display:none;">
        <div class="overall-label">
          <span>Overall progress</span>
          <span id="overall-text"></span>
        </div>
        <div class="bar-track"><div class="bar-fill" id="overall-bar"></div></div>
      </div>
    </div>

    <div class="card" id="detail-card" style="display:none;">
      <h2>Credits by requirement</h2>
      <div id="requirements-list"></div>
    </div>

  </div>
</div>

<script>
  const SUPABASE_URL = "https://ojmqlvtyygvethwrdqon.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qbXFsdnR5eWd2ZXRod3JkcW9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MzEyMTQsImV4cCI6MjA5ODAwNzIxNH0.IWLrhtb4w_dq-_pjW1wzRAX6-0qI4Hmwtp5p_cSSVWM";

  const { createClient } = supabase;
  const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let myAccount = null;
  let cachedRequirements = [];

  async function checkAccess() {
    const { data: sessionData } = await client.auth.getSession();
    if (!sessionData.session) {
      document.getElementById("gate").innerHTML =
        "You're not signed in. Sign in through the LIFT login page first, then come back to this page.";
      return;
    }

    const userId = sessionData.session.user.id;
    const { data: account, error } = await client
      .from("accounts")
      .select("id, name, role")
      .eq("id", userId)
      .single();

    if (error || !account) {
      document.getElementById("gate").innerHTML =
        "Signed in, but no matching accounts row was found for this user.";
      return;
    }

    if (account.role !== "lift_evaluator") {
      document.getElementById("gate").innerHTML =
        "Signed in as " + account.name + " (" + account.role + "). This page is for LIFT staff accounts.";
      return;
    }

    myAccount = account;
    document.getElementById("who-am-i").textContent = account.name;
    document.getElementById("gate-wrap").style.display = "none";
    document.getElementById("app-wrap").style.display = "block";

    await loadRequirements();
    await loadStudents();
  }

  async function loadRequirements() {
    const { data, error } = await client
      .from("graduation_requirements")
      .select("subject_category, credits_required, notes")
      .order("sort_order");
    if (!error) cachedRequirements = data || [];
  }

  async function loadStudents() {
    // High school students only — graduation requirements apply to grades 9-12.
    const { data, error } = await client
      .from("students")
      .select("id, first_name, last_name, grade_level")
      .gte("grade_level", 9)
      .lte("grade_level", 12)
      .order("last_name");

    const select = document.getElementById("student-select");
    if (error) {
      select.innerHTML = '<option value="">Could not load students</option>';
      return;
    }

    select.innerHTML = '<option value="">Choose a student...</option>' +
      (data || []).map(s =>
        '<option value="' + s.id + '">' + s.first_name + " " + s.last_name + " (Grade " + s.grade_level + ")</option>"
      ).join("");
  }

  document.getElementById("student-select").addEventListener("change", async (e) => {
    const studentId = e.target.value;
    if (!studentId) {
      document.getElementById("overall-wrap").style.display = "none";
      document.getElementById("detail-card").style.display = "none";
      return;
    }
    await showProgress(studentId);
  });

  async function showProgress(studentId) {
    // Pull every approved package for this student, with awarded credit info.
    const { data: packages, error } = await client
      .from("review_packages")
      .select("awarded_credit_category, awarded_credit_value")
      .eq("student_id", studentId)
      .eq("status", "approved")
      .not("awarded_credit_category", "is", null);

    if (error) {
      document.getElementById("requirements-list").innerHTML =
        '<div class="empty-note">Could not load progress: ' + error.message + "</div>";
      document.getElementById("detail-card").style.display = "block";
      return;
    }

    // Sum awarded credits by category
    const earnedByCategory = {};
    (packages || []).forEach(p => {
      const cat = p.awarded_credit_category;
      earnedByCategory[cat] = (earnedByCategory[cat] || 0) + parseFloat(p.awarded_credit_value || 0);
    });

    let totalRequired = 0;
    let totalEarnedCapped = 0;

    const rows = cachedRequirements.map(req => {
      const earned = earnedByCategory[req.subject_category] || 0;
      const required = parseFloat(req.credits_required);
      const pct = Math.min(100, Math.round((earned / required) * 100));
      const complete = earned >= required;

      totalRequired += required;
      totalEarnedCapped += Math.min(earned, required);

      return '<div class="req-row">' +
        '<div class="req-top"><span>' + req.subject_category + "</span>" +
        '<span class="req-credits">' + earned + " / " + required + " credits</span></div>" +
        '<div class="bar-track"><div class="bar-fill' + (complete ? " complete" : "") + '" style="width:' + pct + '%"></div></div>' +
        (req.notes ? '<div class="req-note">' + req.notes + "</div>" : "") +
      "</div>";
    }).join("");

    document.getElementById("requirements-list").innerHTML = rows;
    document.getElementById("detail-card").style.display = "block";

    const overallPct = Math.round((totalEarnedCapped / totalRequired) * 100);
    document.getElementById("overall-text").textContent =
      totalEarnedCapped + " / " + totalRequired + " credits (" + overallPct + "%)";
    const overallBar = document.getElementById("overall-bar");
    overallBar.style.width = overallPct + "%";
    overallBar.className = "bar-fill" + (overallPct >= 100 ? " complete" : "");
    document.getElementById("overall-wrap").style.display = "block";
  }

  checkAccess();
</script>

</body>
</html>
