<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIFT Global Academy — Sign in</title>
<link rel="stylesheet" href="lift-style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .login-logo { width: 48px; height: 48px; border-radius: 50%; margin: 0 auto 16px; display: block; }
</style>
</head>
<body>

<div class="center-page">

<div class="card" id="login-card" style="max-width:380px; width:100%;">
  <img class="login-logo" src="lift-logo.png" alt="LIFT Global Academy logo">
  <h1 style="text-align:center;">LIFT Global Academy</h1>
  <div class="subtitle" style="text-align:center; margin-bottom:28px;">Sign in to your account</div>
  <div class="error" id="login-error"></div>
  <form id="login-form">
    <label for="email">Email</label>
    <input type="email" id="email" required autocomplete="email">
    <label for="password">Password</label>
    <input type="password" id="password" required autocomplete="current-password">
    <button type="submit" id="login-button" style="width:100%; margin-top:18px;">Sign in</button>
  </form>
</div>

<div class="card success-screen" id="success-card" style="display:none; max-width:380px; width:100%; text-align:center;">
  <h1>You're logged in</h1>
  <div class="info-row"><span class="info-label">Name</span><span class="info-value" id="info-name"></span></div>
  <div class="info-row"><span class="info-label">Email</span><span class="info-value" id="info-email"></span></div>
  <div class="info-row"><span class="info-label">Role</span><span class="info-value" id="info-role"></span></div>
  <button class="logout-btn" id="logout-button" style="width:100%; margin-top:20px;">Sign out</button>
</div>

</div>

<script>
  // --- Connection to your real Supabase project ---
  const SUPABASE_URL = "https://ojmqlvtyygvethwrdqon.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qbXFsdnR5eWd2ZXRod3JkcW9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MzEyMTQsImV4cCI6MjA5ODAwNzIxNH0.IWLrhtb4w_dq-_pjW1wzRAX6-0qI4Hmwtp5p_cSSVWM";

  const { createClient } = supabase;
  const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const loginCard = document.getElementById("login-card");
  const successCard = document.getElementById("success-card");
  const loginForm = document.getElementById("login-form");
  const loginButton = document.getElementById("login-button");
  const loginError = document.getElementById("login-error");

  function showError(message) {
    loginError.textContent = message;
    loginError.style.display = "block";
  }

  function clearError() {
    loginError.style.display = "none";
  }

  async function showLoggedInScreen(userId) {
    // Look up this user's row in our own accounts table —
    // this confirms the database link (auth user -> accounts row) works end to end.
    const { data, error } = await client
      .from("accounts")
      .select("name, email, role")
      .eq("id", userId)
      .single();

    if (error || !data) {
      showError(
        "Logged in, but no matching row was found in the accounts table for this user. " +
        "Double-check the accounts row's id matches this user's auth id exactly."
      );
      return;
    }

    // Redirect to the right home page based on role.
    if (data.role === "lift_evaluator") {
      window.location.href = "lift_home_evaluator.html";
      return;
    }

    if (data.role === "teacher") {
      window.location.href = "lift_home_teacher.html";
      return;
    }

    // Any other/unrecognized role: fall back to the basic confirmation screen.
    document.getElementById("info-name").textContent = data.name;
    document.getElementById("info-email").textContent = data.email;
    document.getElementById("info-role").textContent = data.role;
    loginCard.style.display = "none";
    successCard.style.display = "block";
  }

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    clearError();
    loginButton.disabled = true;
    loginButton.textContent = "Signing in...";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    const { data, error } = await client.auth.signInWithPassword({ email, password });

    loginButton.disabled = false;
    loginButton.textContent = "Sign in";

    if (error) {
      showError(error.message);
      return;
    }

    await showLoggedInScreen(data.user.id);
  });

  document.getElementById("logout-button").addEventListener("click", async () => {
    await client.auth.signOut();
    successCard.style.display = "none";
    loginCard.style.display = "block";
    loginForm.reset();
  });

  // If already logged in from a previous visit, skip straight to the success screen
  client.auth.getSession().then(({ data }) => {
    if (data.session) {
      showLoggedInScreen(data.session.user.id);
    }
  });
</script>

</body>
</html>
