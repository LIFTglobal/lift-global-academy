<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIFT Global Academy — Teacher</title>
<link rel="stylesheet" href="lift-style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="page">

<div class="wrap" id="gate-wrap">
  <div class="card gate" id="gate">
    <div class="spinner"></div>
    Checking your session...
  </div>
</div>

<div id="app-wrap" style="display:none;">

  <div class="navbar">
    <div class="navbar-inner">
      <a class="navbar-brand" href="lift_home_teacher.html">
        <img class="navbar-logo" src="lift-logo.png" alt="LIFT Global Academy logo">
        <div>
          <div class="navbar-title">Teacher dashboard</div>
          <div class="navbar-subtitle">Signed in as <span id="who-am-i"></span></div>
        </div>
      </a>
      <div class="navbar-actions">
        <a class="navbar-back" href="lift_home_teacher.html">&larr; Back to home</a>
      </div>
    </div>
  </div>

  <div class="wrap">

    <div class="card">
      <h2>Submit a grade &amp; evaluation</h2>
      <form id="grade-form">
        <label for="student-select">Student</label>
        <select id="student-select" required></select>

        <label for="subject">Subject</label>
        <input type="text" id="subject" placeholder="e.g. Chemistry 1" required>

        <label for="grade-value">Grade</label>
        <input type="text" id="grade-value" placeholder="e.g. B+, 87, Secure" required>

        <label for="evaluation">Written evaluation</label>
        <textarea id="evaluation" placeholder="Describe this student's performance, growth areas, and engagement this term..."></textarea>

        <label for="comments">Comments for LIFT (optional)</label>
        <textarea id="comments" placeholder="Anything LIFT's evaluator should know about this submission"></textarea>

        <label for="doc-type">Document type</label>
        <select id="doc-type">
          <option value="report_card">Report card</option>
          <option value="assessment">Assessment</option>
          <option value="writing_sample">Writing sample</option>
          <option value="portfolio_item">Portfolio item</option>
          <option value="standardized_test_result">Standardized test result</option>
          <option value="other">Other</option>
        </select>

        <label for="doc-file">Attach a file (optional)</label>
        <input type="file" id="doc-file">

        <button type="submit" id="draft-btn" data-action="draft">Save as draft</button>
        <button type="submit" class="secondary" id="submit-btn" data-action="submit">Submit for review</button>
      </form>
      <div class="msg" id="grade-msg"></div>
    </div>

    <div class="card">
      <h2>Your submissions</h2>
      <div id="submissions-list"></div>
    </div>

  </div>
</div>

<script>
  const SUPABASE_URL = "https://ojmqlvtyygvethwrdqon.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qbXFsdnR5eWd2ZXRod3JkcW9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MzEyMTQsImV4cCI6MjA5ODAwNzIxNH0.IWLrhtb4w_dq-_pjW1wzRAX6-0qI4Hmwtp5p_cSSVWM";

  const { createClient } = supabase;
  const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let myAccount = null;
  let cachedStudents = [];

  function showMsg(el, text, type) {
    el.textContent = text;
    el.className = "msg " + type;
    el.style.display = "block";
  }
  function clearMsg(el) { el.style.display = "none"; }

  function statusLabel(status) {
    return {
      draft: "Draft",
      pending_review: "Pending review",
      approved: "Approved",
      revisions_requested: "Revisions requested",
    }[status] || status;
  }

  async function checkAccess() {
    const { data: sessionData } = await client.auth.getSession();
    if (!sessionData.session) {
      document.getElementById("gate").innerHTML =
        "You're not signed in. Sign in through the LIFT login page first, then come back to this page.";
      return;
    }

    const userId = sessionData.session.user.id;
    const { data: account, error } = await client
      .from("accounts")
      .select("id, name, role, partner_school_id")
      .eq("id", userId)
      .single();

    if (error || !account) {
      document.getElementById("gate").innerHTML =
        "Signed in, but no matching accounts row was found for this user.";
      return;
    }

    if (account.role !== "teacher") {
      document.getElementById("gate").innerHTML =
        "Signed in as " + account.name + ", but this account's role (" + account.role +
        ") isn't a teacher account, so this page isn't relevant.";
      return;
    }

    myAccount = account;
    document.getElementById("who-am-i").textContent = account.name;
    document.getElementById("gate-wrap").style.display = "none";
    document.getElementById("app-wrap").style.display = "block";

    await loadStudents();
    await loadSubmissions();
  }

  async function loadStudents() {
    const { data, error } = await client
      .from("students")
      .select("id, first_name, last_name, grade_level")
      .eq("partner_school_id", myAccount.partner_school_id)
      .gte("grade_level", 9)
      .lte("grade_level", 12)
      .order("last_name");

    const select = document.getElementById("student-select");
    if (error) {
      select.innerHTML = '<option value="">Could not load students</option>';
      return;
    }

    cachedStudents = data || [];
    select.innerHTML = cachedStudents.length
      ? cachedStudents.map(s =>
          '<option value="' + s.id + '">' + s.first_name + " " + s.last_name + " (Grade " + s.grade_level + ")</option>"
        ).join("")
      : '<option value="">No students at your school yet</option>';
  }

  async function loadSubmissions() {
    const { data, error } = await client
      .from("review_packages")
      .select("id, subject, grade_value, status, student_id, created_at")
      .eq("submitted_by_account_id", myAccount.id)
      .order("created_at", { ascending: false });

    const listEl = document.getElementById("submissions-list");
    if (error) {
      listEl.innerHTML = '<div class="empty-note">Could not load submissions: ' + error.message + "</div>";
      return;
    }

    const packageIds = (data || []).map(p => p.id);
    let docCounts = {};
    if (packageIds.length > 0) {
      const { data: docs } = await client
        .from("documents")
        .select("review_package_id")
        .in("review_package_id", packageIds);
      (docs || []).forEach(d => {
        docCounts[d.review_package_id] = (docCounts[d.review_package_id] || 0) + 1;
      });
    }

    listEl.innerHTML = data.length
      ? data.map(p => {
          const student = cachedStudents.find(s => s.id === p.student_id);
          const studentName = student ? student.first_name + " " + student.last_name : "Unknown student";
          const docCount = docCounts[p.id] || 0;
          const docNote = docCount > 0
            ? " &middot; " + docCount + " file" + (docCount > 1 ? "s" : "") + " attached"
            : " &middot; no files attached";
          return '<div class="list-item">' +
            '<div class="row1"><span>' + studentName + " — " + (p.subject || "") + '</span>' +
            '<span class="status-pill status-' + p.status + '">' + statusLabel(p.status) + "</span></div>" +
            '<div class="meta">Grade: ' + (p.grade_value || "—") + docNote + "</div>" +
            "</div>";
        }).join("")
      : '<div class="empty-note">No submissions yet.</div>';
  }

  document.getElementById("grade-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const msgEl = document.getElementById("grade-msg");
    clearMsg(msgEl);

    const action = e.submitter ? e.submitter.dataset.action : "draft";
    const draftBtn = document.getElementById("draft-btn");
    const submitBtn = document.getElementById("submit-btn");
    draftBtn.disabled = true;
    submitBtn.disabled = true;

    const student_id = document.getElementById("student-select").value;
    const subject = document.getElementById("subject").value.trim();
    const grade_value = document.getElementById("grade-value").value.trim();
    const written_evaluation = document.getElementById("evaluation").value.trim();
    const teacher_comments = document.getElementById("comments").value.trim();

    const isSubmit = action === "submit";

    const payload = {
      student_id,
      subject,
      grade_value,
      written_evaluation,
      teacher_comments,
      submitted_by_account_id: myAccount.id,
      status: isSubmit ? "pending_review" : "draft",
    };

    if (isSubmit) {
      payload.submitted_at = new Date().toISOString();
    }

    const { data: insertedPackage, error } = await client
      .from("review_packages")
      .insert(payload)
      .select()
      .single();

    if (error) {
      draftBtn.disabled = false;
      submitBtn.disabled = false;
      showMsg(msgEl, error.message, "error");
      return;
    }

    // If a file was selected, upload it and link it to the package we just created
    const fileInput = document.getElementById("doc-file");
    const file = fileInput.files[0];

    if (file) {
      const docType = document.getElementById("doc-type").value;
      const filePath = myAccount.partner_school_id + "/" + insertedPackage.id + "/" + Date.now() + "_" + file.name;

      const { error: uploadError } = await client.storage
        .from("documents")
        .upload(filePath, file);

      if (uploadError) {
        draftBtn.disabled = false;
        submitBtn.disabled = false;
        showMsg(msgEl, "Grade saved, but the file upload failed: " + uploadError.message, "error");
        await loadSubmissions();
        return;
      }

      const { error: docRowError } = await client.from("documents").insert({
        review_package_id: insertedPackage.id,
        document_type: docType,
        file_path: filePath,
        file_name: file.name,
        uploaded_by_account_id: myAccount.id,
      });

      if (docRowError) {
        draftBtn.disabled = false;
        submitBtn.disabled = false;
        showMsg(msgEl, "Grade saved, but linking the file failed: " + docRowError.message, "error");
        await loadSubmissions();
        return;
      }
    }

    draftBtn.disabled = false;
    submitBtn.disabled = false;

    showMsg(msgEl, isSubmit ? "Submitted for LIFT review." : "Saved as draft.", "success");
    document.getElementById("grade-form").reset();
    await loadSubmissions();
  });

  checkAccess();
</script>

</body>
</html>
