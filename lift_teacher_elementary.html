<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIFT Global Academy — Elementary Teacher</title>
<link rel="stylesheet" href="lift-style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="page">

<div class="wrap" id="gate-wrap">
  <div class="card gate" id="gate">
    <div class="spinner"></div>
    Checking your session...
  </div>
</div>

<div id="app-wrap" style="display:none;">

  <div class="navbar">
    <div class="navbar-inner">
      <a class="navbar-brand" href="lift_home_teacher.html">
        <img class="navbar-logo" src="lift-logo.png" alt="LIFT Global Academy logo">
        <div>
          <div class="navbar-title">Elementary classroom report</div>
          <div class="navbar-subtitle">Signed in as <span id="who-am-i"></span></div>
        </div>
      </a>
      <div class="navbar-actions">
        <a class="navbar-back" href="lift_home_teacher.html">&larr; Back to home</a>
      </div>
    </div>
  </div>

  <div class="wrap">

    <div class="card">
      <h2>Select a student</h2>
      <select id="student-select"></select>
    </div>

    <div class="card" id="subjects-card" style="display:none;">
      <h2>Term report — all subjects</h2>
      <div id="subjects-container"></div>

      <label for="comments">Comments for LIFT (optional)</label>
      <textarea id="comments" placeholder="Anything LIFT's evaluator should know about this student's term"></textarea>

      <button type="button" id="draft-btn">Save as draft</button>
      <button type="button" class="secondary" id="submit-btn">Submit for review</button>
      <div class="msg" id="form-msg"></div>
    </div>

    <div class="card">
      <h2>Submitted reports this term</h2>
      <div id="submissions-list"></div>
    </div>

  </div>
</div>

<script>
  const SUPABASE_URL = "https://ojmqlvtyygvethwrdqon.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qbXFsdnR5eWd2ZXRod3JkcW9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MzEyMTQsImV4cCI6MjA5ODAwNzIxNH0.IWLrhtb4w_dq-_pjW1wzRAX6-0qI4Hmwtp5p_cSSVWM";

  const { createClient } = supabase;
  const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Fixed subject list for all elementary grades, for this first pass.
  const SUBJECTS = ["Reading", "Writing", "Math", "Science", "Social Studies"];

  let myAccount = null;
  let cachedStudents = [];

  function showMsg(el, text, type) {
    el.textContent = text;
    el.className = "msg " + type;
    el.style.display = "block";
  }
  function clearMsg(el) { el.style.display = "none"; }

  function statusLabel(status) {
    return {
      draft: "Draft",
      pending_review: "Pending review",
      approved: "Approved",
      revisions_requested: "Revisions requested",
    }[status] || status;
  }

  async function checkAccess() {
    const { data: sessionData } = await client.auth.getSession();
    if (!sessionData.session) {
      document.getElementById("gate").innerHTML =
        "You're not signed in. Sign in through the LIFT login page first, then come back to this page.";
      return;
    }

    const userId = sessionData.session.user.id;
    const { data: account, error } = await client
      .from("accounts")
      .select("id, name, role, partner_school_id")
      .eq("id", userId)
      .single();

    if (error || !account) {
      document.getElementById("gate").innerHTML =
        "Signed in, but no matching accounts row was found for this user.";
      return;
    }

    if (account.role !== "teacher") {
      document.getElementById("gate").innerHTML =
        "Signed in as " + account.name + ", but this account's role (" + account.role +
        ") isn't a teacher account, so this page isn't relevant.";
      return;
    }

    myAccount = account;
    document.getElementById("who-am-i").textContent = account.name;
    document.getElementById("gate-wrap").style.display = "none";
    document.getElementById("app-wrap").style.display = "block";

    await loadStudents();
    await loadSubmissions();
  }

  async function loadStudents() {
    const { data, error } = await client
      .from("students")
      .select("id, first_name, last_name, grade_level")
      .eq("partner_school_id", myAccount.partner_school_id)
      .lte("grade_level", 5)
      .order("last_name");

    const select = document.getElementById("student-select");
    if (error) {
      select.innerHTML = '<option value="">Could not load students</option>';
      return;
    }

    cachedStudents = data || [];
    select.innerHTML = '<option value="">Choose a student...</option>' + cachedStudents.map(s =>
      '<option value="' + s.id + '">' + s.first_name + " " + s.last_name + " (Grade " + s.grade_level + ")</option>"
    ).join("");
  }

  function buildSubjectFields() {
    const container = document.getElementById("subjects-container");
    container.innerHTML = SUBJECTS.map((subject, i) => {
      const key = subject.toLowerCase().replace(/\s+/g, "_");
      return '<div class="subject-block">' +
        "<h3>" + subject + "</h3>" +
        '<div class="subject-row">' +
          '<label for="grade-' + key + '">Grade</label>' +
          '<input type="text" id="grade-' + key + '" placeholder="e.g. Secure, B+, 88">' +
        "</div>" +
        '<label for="eval-' + key + '">Evaluation notes</label>' +
        '<textarea id="eval-' + key + '" placeholder="Brief notes on this subject this term"></textarea>' +
      "</div>";
    }).join("");
  }

  document.getElementById("student-select").addEventListener("change", (e) => {
    const subjectsCard = document.getElementById("subjects-card");
    if (e.target.value) {
      buildSubjectFields();
      subjectsCard.style.display = "block";
    } else {
      subjectsCard.style.display = "none";
    }
  });

  async function submitReport(isSubmit) {
    const msgEl = document.getElementById("form-msg");
    clearMsg(msgEl);

    const studentId = document.getElementById("student-select").value;
    if (!studentId) {
      showMsg(msgEl, "Choose a student first.", "error");
      return;
    }

    const draftBtn = document.getElementById("draft-btn");
    const submitBtn = document.getElementById("submit-btn");
    draftBtn.disabled = true;
    submitBtn.disabled = true;

    const teacher_comments = document.getElementById("comments").value.trim();
    const status = isSubmit ? "pending_review" : "draft";
    const submitted_at = isSubmit ? new Date().toISOString() : null;

    // One review_package per subject, all created together as this student's term report.
    const errors = [];
    for (const subject of SUBJECTS) {
      const key = subject.toLowerCase().replace(/\s+/g, "_");
      const grade_value = document.getElementById("grade-" + key).value.trim();
      const written_evaluation = document.getElementById("eval-" + key).value.trim();

      // Skip subjects the teacher left completely blank
      if (!grade_value && !written_evaluation) continue;

      const { error } = await client.from("review_packages").insert({
        student_id: studentId,
        subject,
        grade_value,
        written_evaluation,
        teacher_comments,
        submitted_by_account_id: myAccount.id,
        status,
        submitted_at,
      });

      if (error) errors.push(subject + ": " + error.message);
    }

    draftBtn.disabled = false;
    submitBtn.disabled = false;

    if (errors.length > 0) {
      showMsg(msgEl, "Some subjects failed to save — " + errors.join("; "), "error");
      return;
    }

    showMsg(msgEl, isSubmit ? "Report submitted for LIFT review." : "Saved as draft.", "success");
    document.getElementById("subjects-card").style.display = "none";
    document.getElementById("student-select").value = "";
    document.getElementById("comments").value = "";
    await loadSubmissions();
  }

  document.getElementById("draft-btn").addEventListener("click", () => submitReport(false));
  document.getElementById("submit-btn").addEventListener("click", () => submitReport(true));

  async function loadSubmissions() {
    const { data, error } = await client
      .from("review_packages")
      .select("id, subject, grade_value, status, student_id, created_at")
      .eq("submitted_by_account_id", myAccount.id)
      .order("created_at", { ascending: false });

    const listEl = document.getElementById("submissions-list");
    if (error) {
      listEl.innerHTML = '<div class="empty-note">Could not load submissions: ' + error.message + "</div>";
      return;
    }

    listEl.innerHTML = data.length
      ? data.map(p => {
          const student = cachedStudents.find(s => s.id === p.student_id);
          const studentName = student ? student.first_name + " " + student.last_name : "Unknown student";
          return '<div class="list-item">' +
            '<div class="row1"><span>' + studentName + " — " + (p.subject || "") + '</span>' +
            '<span class="status-pill status-' + p.status + '">' + statusLabel(p.status) + "</span></div>" +
            '<div class="meta">Grade: ' + (p.grade_value || "—") + "</div>" +
            "</div>";
        }).join("")
      : '<div class="empty-note">No submissions yet.</div>';
  }

  checkAccess();
</script>

</body>
</html>
