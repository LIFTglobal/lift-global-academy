  // Fetches an image URL and returns it as a base64 data URL, which is what
  // jsPDF needs to embed an image (a plain external URL won't work).
  async function urlToDataUrl(url) {
    const resp = await fetch(url);
    const blob = await resp.blob();
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  function imageFormatFromDataUrl(dataUrl) {
    if (dataUrl.indexOf("image/jpeg") !== -1 || dataUrl.indexOf("image/jpg") !== -1) return "JPEG";
    if (dataUrl.indexOf("image/webp") !== -1) return "WEBP";
    return "PNG";
  }

  // Standard 100-point-scale GPA conversion (matches the scale printed on
  // the sample high school transcript). Grades are still free-typed by
  // teachers -- this is a best-effort parse of whatever numeric score was
  // entered; anything that isn't a plain number returns null and is left
  // out of the GPA average rather than guessed at.
  const GPA_SCALE = [
    { min: 94, point: 4.0 },
    { min: 90, point: 3.67 },
    { min: 87, point: 3.33 },
    { min: 83, point: 3.0 },
    { min: 80, point: 2.67 },
    { min: 77, point: 2.33 },
    { min: 73, point: 2.0 },
    { min: 70, point: 1.67 },
    { min: 67, point: 1.33 },
    { min: 63, point: 1.0 },
    { min: 60, point: 0.67 },
    { min: -Infinity, point: 0 },
  ];

  function scoreToGpaPoint(gradeValue) {
    const score = parseFloat(gradeValue);
    if (isNaN(score)) return null;
    const tier = GPA_SCALE.find(t => score >= t.min);
    return tier ? tier.point : null;
  }

  // ===========================================================================
  // Elementary transcript (grades Pre-K through 5) -- matches the sample layout:
  // partner logo + school name header, 3-column student info block, a
  // Schools/Credit Sources table, a subject-by-subject credit summary, and the
  // comments/signature/seal/footer boxes. No GPA at this grade band -- grading
  // scales vary school to school by design (see PROJECT_CONTEXT.md).
  // ===========================================================================
  function generateElementaryPdf(student, school, history, packages, partnerLogoDataUrl, generatedBy) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "pt", format: "letter" });
    const pageWidth = doc.internal.pageSize.getWidth();
    const marginX = 40;
    const rightColX = 400;
    let y = 40;

    // ---- Header: partner logo + school name (left), title (right) ----
    if (partnerLogoDataUrl) {
      try {
        doc.addImage(partnerLogoDataUrl, imageFormatFromDataUrl(partnerLogoDataUrl), marginX, y, 44, 44);
      } catch (e) { /* continue without the logo */ }
    }
    doc.setFont("helvetica", "bold");
    doc.setFontSize(13);
    doc.setTextColor(26, 46, 68);
    doc.text(school.name || "Partner School", marginX + 54, y + 26);

    doc.setFont("helvetica", "normal");
    doc.setFontSize(14);
    doc.setTextColor(30, 30, 30);
    doc.text("Official Transcript", pageWidth - marginX, y + 20, { align: "right" });

    y += 66;
    doc.setDrawColor(190, 190, 190);
    doc.line(marginX, y, pageWidth - marginX, y);
    y += 22;

    // ---- Student info block (3 columns) ----
    const totalCredits = packages.reduce((sum, p) => sum + (parseFloat(p.awarded_credit_value) || 0), 0);
    const infoRows = [
      ["Student: " + student.first_name + " " + student.last_name, "DOB: " + (student.date_of_birth || "—"), "Gender: " + (student.gender || "—")],
      ["Parent/Guardian(s):", "", "Total Credits: " + totalCredits],
      ["Name: " + (student.parent_guardian_name || "—"), "", ""],
      ["Address: " + (student.address_line || "—"), "", ""],
      ["City: " + [student.city, student.state, student.zip].filter(Boolean).join(", "), "", ""],
    ];
    doc.setFontSize(9.5);
    infoRows.forEach(row => {
      doc.setFont("helvetica", "normal");
      doc.setTextColor(20, 20, 20);
      if (row[0]) doc.text(row[0], marginX, y);
      if (row[1]) doc.text(row[1], marginX + 190, y);
      if (row[2]) doc.text(row[2], rightColX, y);
      y += 14;
    });

    y += 8;
    doc.setDrawColor(220, 220, 220);
    doc.line(marginX, y, pageWidth - marginX, y);
    y += 20;

    // ---- Schools / Credit Sources ----
    doc.setFont("helvetica", "bold");
    doc.setFontSize(11);
    doc.setTextColor(26, 46, 68);
    doc.text("Schools / Credit Sources", marginX, y);
    y += 16;

    const schoolCols = [
      { label: "School", x: marginX, w: 90 },
      { label: "Teacher", x: marginX + 90, w: 75 },
      { label: "Grade", x: marginX + 165, w: 40 },
      { label: "Days P/A", x: marginX + 205, w: 55 },
      { label: "Promotion", x: marginX + 260, w: 60 },
      { label: "Address", x: marginX + 320, w: pageWidth - marginX - (marginX + 320) },
    ];
    doc.setFontSize(8);
    doc.setFont("helvetica", "bold");
    schoolCols.forEach(c => doc.text(c.label, c.x, y));
    y += 5;
    doc.line(marginX, y, pageWidth - marginX, y);
    y += 12;

    doc.setFont("helvetica", "normal");
    if (history.length === 0) {
      doc.setTextColor(140, 140, 140);
      doc.text("No school history on file yet.", marginX, y);
      y += 14;
    } else {
      history.forEach(h => {
        const addr = [h.address_line, h.city, h.state, h.zip].filter(Boolean).join(", ");
        doc.setTextColor(20, 20, 20);
        doc.text(String(h.school_name || "—"), schoolCols[0].x, y, { maxWidth: schoolCols[0].w });
        doc.text(String(h.teacher_name || "—"), schoolCols[1].x, y, { maxWidth: schoolCols[1].w });
        doc.text(String(h.grade_level_label || "—"), schoolCols[2].x, y, { maxWidth: schoolCols[2].w });
        doc.text((h.days_present != null ? h.days_present : "—") + "/" + (h.days_absent != null ? h.days_absent : "—"), schoolCols[3].x, y, { maxWidth: schoolCols[3].w });
        doc.text(String(h.promotion_status || "—"), schoolCols[4].x, y, { maxWidth: schoolCols[4].w });
        doc.text(addr || "—", schoolCols[5].x, y, { maxWidth: schoolCols[5].w });
        y += 14;
      });
    }

    y += 10;
    doc.setDrawColor(220, 220, 220);
    doc.line(marginX, y, pageWidth - marginX, y);
    y += 22;

    // ---- Course table (left column) + Credit summary (right column) ----
    const courseTop = y;
    const courseColWidth = 330;
    doc.setFont("helvetica", "bold");
    doc.setFontSize(10.5);
    doc.setTextColor(26, 46, 68);
    doc.text("Course Record", marginX, y);
    y += 16;

    doc.setFontSize(8);
    doc.text("Year", marginX, y);
    doc.text("Subject", marginX + 55, y);
    doc.text("Grade", marginX + 220, y);
    doc.text("Credits", marginX + 280, y);
    y += 5;
    doc.line(marginX, y, marginX + courseColWidth, y);
    y += 12;

    doc.setFont("helvetica", "normal");
    const creditsBySubject = {};
    packages.forEach(p => {
      if (y > 700) { doc.addPage(); y = 40; }
      const year = p.created_at ? new Date(p.created_at).getFullYear() : "—";
      doc.setTextColor(20, 20, 20);
      doc.text(String(year), marginX, y);
      doc.text(String(p.subject || "—"), marginX + 55, y, { maxWidth: 155 });
      doc.text(String(p.grade_value || "—"), marginX + 220, y);
      const val = p.awarded_credit_value != null ? p.awarded_credit_value : 0;
      doc.text(String(val), marginX + 280, y);

      const subjectKey = p.subject || "Other";
      creditsBySubject[subjectKey] = (creditsBySubject[subjectKey] || 0) + parseFloat(val || 0);
      y += 14;
    });

    // Credit summary panel, right column -- simple per-subject totals.
    // (Elementary subjects don't map to LIFT's high-school graduation
    // categories, so this is a straight sum per subject, not a progress-
    // against-requirement view like the high school transcript.)
    let sy = courseTop;
    const sx = rightColX;
    doc.setFont("helvetica", "bold");
    doc.setFontSize(10.5);
    doc.setTextColor(26, 46, 68);
    doc.text("Credit Summary", sx, sy);
    sy += 16;
    doc.setFontSize(8);
    doc.text("Subject", sx, sy);
    doc.text("Credits", sx + 110, sy);
    sy += 5;
    doc.line(sx, sy, pageWidth - marginX, sy);
    sy += 12;

    doc.setFont("helvetica", "normal");
    Object.keys(creditsBySubject).sort().forEach(subject => {
      doc.setTextColor(20, 20, 20);
      doc.text(subject, sx, sy, { maxWidth: 100 });
      doc.text(String(creditsBySubject[subject]), sx + 110, sy);
      sy += 13;
    });
    sy += 4;
    doc.line(sx, sy, pageWidth - marginX, sy);
    sy += 14;
    doc.setFont("helvetica", "bold");
    doc.text("Total", sx, sy);
    doc.text(String(totalCredits), sx + 110, sy);

    y = Math.max(y, sy) + 30;

    // ---- Special comments / signature / seal ----
    if (y > 620) { doc.addPage(); y = 40; }

    doc.setFont("helvetica", "bold");
    doc.setFontSize(9);
    doc.setTextColor(26, 46, 68);
    doc.text("Special Comments", marginX, y);
    doc.roundedRect(marginX, y + 6, 260, 40, 3, 3);

    doc.text("Authorized Signature", marginX + 280, y);
    doc.roundedRect(marginX + 280, y + 6, 200, 40, 3, 3);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(8);
    doc.text("Title: " + (generatedBy && generatedBy.role === "lift_evaluator" ? "Registrar" : "—"), marginX + 284, y + 58);
    doc.text("Date: " + new Date().toLocaleDateString(), marginX + 400, y + 58);

    y += 74;
    doc.setFont("helvetica", "bold");
    doc.setFontSize(9);
    doc.text("Official Seal", marginX, y);
    doc.circle(marginX + 40, y + 40, 34);

    y += 100;

    // ---- Footer ----
    if (y > 730) { doc.addPage(); y = 40; }
    doc.setDrawColor(200, 200, 200);
    doc.line(marginX, y, pageWidth - marginX, y);
    y += 14;
    doc.setFont("helvetica", "bold");
    doc.setFontSize(8);
    doc.setTextColor(60, 60, 60);
    doc.text("LIFT GLOBAL Academy | PO BOX 8429, Woodland, CA 95695", marginX, y);
    y += 12;
    doc.setFont("helvetica", "normal");
    doc.text("(530) 867-1834  |  liftglobalacademy.com  |  liftglobalacademy@gmail.com", marginX, y);
    y += 12;
    doc.setFont("helvetica", "italic");
    doc.setFontSize(7.5);
    doc.text("Transcript unofficial unless signed bears official seal, and sealed in an envelope.", marginX, y);

    try {
      doc.addImage(LIFT_LOGO_BASE64, "PNG", pageWidth - marginX - 90, y - 34, 26, 26);
      doc.setFont("helvetica", "bold");
      doc.setFontSize(11);
      doc.setTextColor(26, 46, 68);
      doc.text("Global Academy", pageWidth - marginX - 58, y - 20);
    } catch (e) { /* continue without the footer logo */ }

    const fileName = "LIFT_Transcript_" + student.last_name + "_" + student.first_name + ".pdf";
    doc.save(fileName);
  }

  // ===========================================================================
  // Secondary (grades 6-12) transcript -- same visual template as the
  // elementary one, plus GPA (computed from the numeric grade_value via the
  // standard scale above) and a credit summary built from LIFT's real
  // graduation_requirements categories (same logic as lift_graduation_progress.html
  // -- reused rather than rebuilt, per the handoff notes).
  // ===========================================================================
  function generateSecondaryPdf(student, school, history, packages, requirements, partnerLogoDataUrl, generatedBy) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "pt", format: "letter" });
    const pageWidth = doc.internal.pageSize.getWidth();
    const marginX = 40;
    const rightColX = 400;
    let y = 40;

    // ---- Header: partner logo + school name (left), title (right) ----
    if (partnerLogoDataUrl) {
      try {
        doc.addImage(partnerLogoDataUrl, imageFormatFromDataUrl(partnerLogoDataUrl), marginX, y, 44, 44);
      } catch (e) { /* continue without the logo */ }
    }
    doc.setFont("helvetica", "bold");
    doc.setFontSize(13);
    doc.setTextColor(26, 46, 68);
    doc.text(school.name || "Partner School", marginX + 54, y + 26);

    doc.setFont("helvetica", "normal");
    doc.setFontSize(14);
    doc.setTextColor(30, 30, 30);
    doc.text("Official Transcript", pageWidth - marginX, y + 20, { align: "right" });

    y += 66;
    doc.setDrawColor(190, 190, 190);
    doc.line(marginX, y, pageWidth - marginX, y);
    y += 22;

    // ---- GPA: credit-weighted average of every approved course's numeric score ----
    let gpaPointTotal = 0;
    let gpaCreditTotal = 0;
    packages.forEach(p => {
      const point = scoreToGpaPoint(p.grade_value);
      const credit = parseFloat(p.awarded_credit_value) || 0;
      if (point !== null && credit > 0) {
        gpaPointTotal += point * credit;
        gpaCreditTotal += credit;
      }
    });
    const gpa = gpaCreditTotal > 0 ? (gpaPointTotal / gpaCreditTotal).toFixed(2) : "—";
    const totalCredits = packages.reduce((sum, p) => sum + (parseFloat(p.awarded_credit_value) || 0), 0);

    // ---- Student info block (3 columns) ----
    const infoRows = [
      ["Student: " + student.first_name + " " + student.last_name, "DOB: " + (student.date_of_birth || "—"), "Gender: " + (student.gender || "—")],
      ["Parent/Guardian(s):", "", "Credits: " + totalCredits],
      ["Name: " + (student.parent_guardian_name || "—"), "Grading scale (GPA): " + gpa, "GPA: " + gpa],
      ["Address: " + (student.address_line || "—"), "A:100-94(4.0), A-:93-90(3.67), B+:89-87(3.33), B:86-83(3.0),", ""],
      ["City: " + [student.city, student.state, student.zip].filter(Boolean).join(", "), "B-:82-80(2.67), C+:79-77(2.33), C:76-73(2.0), C-:72-70(1.67),", ""],

    ];
    doc.setFontSize(8.5);
    infoRows.forEach(row => {
      doc.setFont("helvetica", "normal");
      doc.setTextColor(20, 20, 20);
      if (row[0]) doc.text(row[0], marginX, y);
      if (row[1]) doc.text(row[1], marginX + 190, y);
      if (row[2]) doc.text(row[2], rightColX, y);
      y += 13;
    });

    y += 8;
    doc.setDrawColor(220, 220, 220);
    doc.line(marginX, y, pageWidth - marginX, y);
    y += 20;

    // ---- Schools / Credit Sources (entered/exited dates, not teacher/attendance --
    //      that's the elementary version's shape) ----
    doc.setFont("helvetica", "bold");
    doc.setFontSize(11);
    doc.setTextColor(26, 46, 68);
    doc.text("Schools / Credit Sources", marginX, y);
    y += 16;

    const schoolCols = [
      { label: "School", x: marginX, w: 140 },
      { label: "Address", x: marginX + 140, w: 130 },
      { label: "City/State/Zip", x: marginX + 270, w: 110 },
      { label: "Entered", x: marginX + 380, w: 55 },
      { label: "Exited", x: marginX + 435, w: pageWidth - marginX - (marginX + 435) },

    doc.setFontSize(8);

    y += 5;

      });
    }

    y += 10;
    doc.setDrawColor(220, 220, 220);
    doc.line(marginX, y, pageWidth - marginX, y);
    y += 22;

    // ---- Course table (left) + Credit summary against real requirements (right) ----
    const courseTop = y;
    const courseColWidth = 330;
    doc.setFont("helvetica", "bold");
    doc.setFontSize(10.5);
    doc.setTextColor(26, 46, 68);
    doc.text("Course Record", marginX, y);
    y += 16;

    doc.setFontSize(8);
    doc.text("Year", marginX, y);
    doc.text("Subject", marginX + 45, y);
    doc.text("Grade", marginX + 220, y);
    doc.text("Category", marginX + 255, y);
    y += 5;
    doc.line(marginX, y, marginX + courseColWidth, y);
    y += 12;

    doc.setFont("helvetica", "normal");
    packages.forEach(p => {

      doc.text(String(p.subject || "—"), marginX + 45, y, { maxWidth: 165 });
      doc.text(String(p.grade_value || "—"), marginX + 220, y);
      doc.text(String(p.awarded_credit_category || "—"), marginX + 255, y, { maxWidth: courseColWidth - 255 });
      y += 14;
    });

    // Credit summary panel -- reuses the same required/earned/remaining logic
    // as lift_graduation_progress.html, against the live graduation_requirements table.
    const earnedByCategory = {};
    packages.forEach(p => {
      if (p.awarded_credit_category) {
        earnedByCategory[p.awarded_credit_category] = (earnedByCategory[p.awarded_credit_category] || 0) + (parseFloat(p.awarded_credit_value) || 0);
      }
    });

    let sy = courseTop;
    const sx = rightColX;
    doc.setFont("helvetica", "bold");
    doc.setFontSize(10.5);
    doc.setTextColor(26, 46, 68);
    doc.text("Credit Summary", sx, sy);
    sy += 16;
    doc.setFontSize(7.5);
    doc.text("Category", sx, sy);
    doc.text("Req", sx + 95, sy);
    doc.text("Earned", sx + 125, sy);
    doc.text("Rem", sx + 160, sy);
    sy += 5;
    doc.line(sx, sy, pageWidth - marginX, sy);
    sy += 11;

    doc.setFont("helvetica", "normal");
    doc.setFontSize(7.5);
    requirements.forEach(req => {
      if (sy > 700) { doc.addPage(); sy = 40; }
      const earned = earnedByCategory[req.subject_category] || 0;
      const required = parseFloat(req.credits_required);
      const remaining = Math.max(0, required - earned);
      doc.setTextColor(20, 20, 20);
      doc.text(req.subject_category, sx, sy, { maxWidth: 92 });
      doc.text(String(required), sx + 95, sy);
      doc.text(String(earned), sx + 125, sy);
      doc.text(String(remaining), sx + 160, sy);
      sy += 12;
    });

    y = Math.max(y, sy) + 26;

    // ---- Special comments / signature / seal ----
    if (y > 600) { doc.addPage(); y = 40; }

    doc.setFont("helvetica", "bold");
    doc.setFontSize(9);
    doc.setTextColor(26, 46, 68);
    doc.text("Special Comments", marginX, y);
    doc.roundedRect(marginX, y + 6, 260, 40, 3, 3);

    doc.text("Authorized Signature", marginX + 280, y);
    doc.roundedRect(marginX + 280, y + 6, 200, 40, 3, 3);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(8);
    doc.text("Title: " + (generatedBy && generatedBy.role === "lift_evaluator" ? "Registrar" : "—"), marginX + 284, y + 58);
    doc.text("Date: " + new Date().toLocaleDateString(), marginX + 400, y + 58);

    y += 74;
    doc.setFont("helvetica", "bold");
    doc.setFontSize(9);
    doc.text("Official Seal", marginX, y);
    doc.circle(marginX + 40, y + 40, 34);

    y += 100;

    // ---- Footer ----
    if (y > 730) { doc.addPage(); y = 40; }
    doc.setDrawColor(200, 200, 200);
    doc.line(marginX, y, pageWidth - marginX, y);
    y += 14;
    doc.setFont("helvetica", "bold");
    doc.setFontSize(8);
    doc.setTextColor(60, 60, 60);
    doc.text("LIFT GLOBAL Academy | PO BOX 8429, Woodland, CA 95695", marginX, y);
    y += 12;
    doc.setFont("helvetica", "normal");
    doc.text("(530) 867-1834  |  liftglobalacademy.com  |  liftglobalacademy@gmail.com", marginX, y);
    y += 12;
    doc.setFont("helvetica", "italic");
    doc.setFontSize(7.5);
    doc.text("Transcript unofficial unless signed bears official seal, and sealed in an envelope.", marginX, y);

    try {
      doc.addImage(LIFT_LOGO_BASE64, "PNG", pageWidth - marginX - 90, y - 34, 26, 26);
      doc.setFont("helvetica", "bold");
      doc.setFontSize(11);
      doc.setTextColor(26, 46, 68);
      doc.text("Global Academy", pageWidth - marginX - 58, y - 20);
    } catch (e) { /* continue without the footer logo */ }

    const fileName = "LIFT_Transcript_" + student.last_name + "_" + student.first_name + ".pdf";
    doc.save(fileName);
  }

  function showMsg(el, text, type) {
    el.textContent = text;
    el.className = "msg " + type;
    el.style.display = "block";
  }

  checkAccess();
</script>

</body>
</html>
